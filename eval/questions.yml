# Curated retrieval eval.
#
# Populate with golden-path questions and expected citations / answer substrings.
# Keep expectations minimal and specific (one or two facts per question) so the
# coverage metric reflects retrieval quality rather than answer verbosity.
#
# Fields:
#   question          - prompt sent to the endpoint
#   route             - "knowledge" (direct KA) or "supervisor"
#   expect_doc_ids    - list of report_ids that SHOULD be cited
#   expect_substrings - list of strings that SHOULD appear in the answer

- question: "What is the latest report?"
  route: supervisor
  expect_doc_ids: []
  expect_substrings: ["2025"]

- question: "Show reports by primary author"
  route: supervisor
  expect_doc_ids: []
  expect_substrings: []

